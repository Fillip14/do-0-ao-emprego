<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tema 13</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Task Manager</h1>
        <form id="task-form">
            <input id="task-input" type="text" placeholder="new task">
            <button type="submit">add</button>
        </form>
        <ul id="task-list">
            <li>
                <span class="title">Texto 1</span>
                <button class="done">done</button>
                <button class="remove">x</button>
            </li>
            <li class="completed">
                <span class="title">Texto 2</span>
                <button class="done">done</button>
                <button class="remove">x</button>
            </li>
            <li>
                <span class="title">Texto 3</span>
                <button class="done">done</button>
                <button class="remove">x</button>
            </li>
        </ul>
    </main>
</body>
</html>
